client:

  # default: 30
  # Timeout in seconds
  # WARNING: Developer has disabled timeout enforcement for current dev builds.
  vctimeout: 30

  # default: 2
  # Idle websocket timeout in minutes
  idletimeout: 2

  # default: false
  # Only allow bedrock players to join the chat
  requireBedrock: false

  # default: true
  # Allows bedrock clients to open the SVG menu via emotes.
  # WARNING: Make sure off-hand-emote is disabled in Geyser to avoid conflicts.
  useEmoteForSVG: true

server:

  group:

    # Settings for the default group for SVG web players.
    default:

      # default: true
      # Decides whether the SVG group is created for players who use the website.
      enabled: true

      # default: 1a2b
      # Controls the default group's password.
      password: 1a2b

      # default: false
      # Force assigning the default SVG group even when a user already has a group.
      force-on-web-join: false

  # default: 8080
  # Port server will run on.
  port: 8080

  # default: 0.0.0.0
  # Address server binds to; use 127.0.0.1 to only allow host-local access.
  bind-address: 0.0.0.0

  # default: /
  # Context path for hosting SVG web UI behind proxies/subpaths.
  context-path: /

  audio:

    # default: auto
    # Audio transport preference: auto | legacy | svg-v2
    transport-mode: auto

    # default: true
    # During migration, fallback to legacy transport for incompatible clients.
    allow-legacy-fallback: true

# default: false
# Debug logs
# Do NOT use this in production. This will very quickly fill up your server logs.
debug: false

# default: true
# Check for plugin updates on startup.
updatechecker:
  enable: true

# default: 0.1.1-dev-migration1
# Internal config schema marker used for migration tracking.
config-version: 0.1.1-dev-migration1
