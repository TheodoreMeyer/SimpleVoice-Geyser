name: Trigger Website Docs Rebuild

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger website workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_TRIGGER_TOKEN }}" \
            https://api.github.com/repos/TheodoreMeyer/theodoremeyer.github.io/dispatches \
            -d '{"event_type":"svg-docs-updated"}'