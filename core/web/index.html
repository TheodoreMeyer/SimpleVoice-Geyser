<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SimpleVoice-Geyser</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ptt.css">
    <link rel="icon" href="images/svg-temp.ico" type="image/x-icon">
</head>

<body>
    <h1>Join Simple Voice Chat</h1>
    <div id="form-container">
        <form id="joinForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required autocomplete="svg-password">

            <label for="mic">Select Microphone:</label>
            <select id="mic" name="mic">
                <option disabled selected hidden>Select</option>
            </select>

            <label for="speaker">Select Speaker:</label>
            <select id="speaker" name="speaker">
                <option disabled selected hidden>Select</option>
            </select>

            <button type="submit" id="joinbtn">Join</button>
        </form>
    </div>
    <noscript>
        <div style="background:red; color:white; padding:10px; text-align:center; font-weight: bolder;">
            <h2>Error:</h2>
            <p>JavaScript is required to use this application.</p>
        </div>
    </noscript>
    <div id="main-vc-container">
        <br>
        <div id="status">Waiting to join...</div>
        <div id="log"></div>
        <br>
        <div id="inputArea">
            <label for="msgInput">Message</label>
            <input type="text" id="msgInput" placeholder="Type a message..." />
            <button id="messageButton">Send</button>
        </div>
    </div>
    <br>
    <div id="controls">
        <div id="controls-main">
            <div class="control-group">
                <span class="control-label">Microphone</span>
                <div id="micControls">
                    <button id="muteBtn" class="unmuted">Mute</button>
                    <span id="micIndicator" title="Mic activity"></span>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">Transmit Mode</span>
                <select id="transmitModeSelect" aria-label="Transmit mode">
                    <option value="voice">Voice Activity</option>
                    <option value="ptt">Push-To-Talk</option>
                </select>
            </div>

            <div class="control-group" id="pttBindingControls" hidden>
                <span class="control-label">PTT Binding</span>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
                    <button id="bindPttBtn" type="button">Bind Push-to-Talk</button>
                    <button id="clearPttBtn" type="button">Clear Binding</button>
                </div>
                <small id="pttBindingLabel">No binding set. Use the hold button or add a binding.</small>
                <label style="display: flex; align-items: center; gap: 8px; width: auto; margin: 0;">
                    <input type="checkbox" id="allowBackgroundPtt">
                    <span>Allow background controller PTT</span>
                </label>
            </div>

            <div class="control-group" id="pttControls" hidden>
                <span class="control-label">Push-to-Talk</span>
                <div>
                    <button id="pushToTalkBtn" class="pttButton" type="button">Hold to Talk</button>
                    <button id="fullscreenPttBtn" type="button">Fullscreen PTT</button>
                </div>
            </div>

            <!-- Add more real controls here later -->
        </div>
        <div class="controls-divider"></div>
        <div id="controls-dev">
            <button id="devToggle" class="dev-toggle">
                Developer Tools ▼
            </button>
            <div id="devContent">
                <div class="control-group">
                    <span class="control-label">Debug Audio</span>
                    <button id="testSound" type="button">Test Sound</button>
                </div>
            </div>
        </div>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
        <a href="https://github.com/TheodoreMeyer/SimpleVoice-Geyser" target="_blank">
            <img src="images/github.svg" alt="GitHub Link" class="githubicon">
            <span>Theodore Meyer</span>
        </a>
    </div>

    <div id="pttFullscreenOverlay" aria-hidden="true">
        <button id="pushToTalkFullscreenBtn" class="pttButton" type="button">Hold to Talk</button>
        <button id="exitFullscreenPttBtn" type="button">Exit Fullscreen</button>
    </div>

    <script type="module">
        import { start } from '/js/client.js';
        start(); // manually triggers it
    </script>

</body>
</html>
