<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SimpleVoice-Geyser</title>
        <link rel="stylesheet" href="/css/styles.css">
        <link rel="stylesheet" href="/css/ptt.css">
    </head>
    <body>
    <h1>Join Simple Voice Chat</h1>
    <form id="joinForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required autocomplete="password">

        <label for="mic">Select Microphone:</label>
        <select id="mic" name="mic"></select>

        <label for="speaker">Select Speaker:</label>
        <select id="speaker" name="speaker"></select>

        <div class="settingsBlock">
            <label for="transmitMode">Transmit Mode:</label>
            <select id="transmitMode" name="transmitMode">
                <option value="voice">Voice Activity</option>
                <option value="ptt">Push to Talk</option>
            </select>

            <div id="pttBindingControls" hidden>
                <div class="inlineButtons">
                    <button type="button" id="bindPttBtn">Bind Push-to-Talk</button>
                    <button type="button" id="clearPttBtn">Clear Binding</button>
                </div>
                <div id="pttBindingLabel">No binding set. Use the hold button or add a binding.</div>
                
                <div class="checkboxSetting">
                    <input type="checkbox" id="allowBackgroundPtt" name="allowBackgroundPtt">
                    <label for="allowBackgroundPtt">Allow Background PTT (Controller only)</label>
                </div>

                <p class="settingsHint">Bindings support keyboard keys, side mouse buttons, and standard controller buttons on Xbox, PlayStation, and Nintendo pads.</p>
            </div>
        </div>

        <button type="submit" id="joinbtn">Join</button>
    </form>

    <div id="micControls">
        <button id="muteBtn" class="unmuted">Mute</button>
        <span id="micIndicator" title="Mic activity"></span>
    </div>

    <div id="pttControls" hidden>
        <button id="pushToTalkBtn" class="pttButton" type="button">Hold to Talk</button>
        <button id="fullscreenPttBtn" type="button">Fullscreen Push-to-Talk</button>
    </div>

    <div id="status">Waiting to join...</div>
    <div id="log"></div>

    <div id="inputArea">
        <label for="msgInput"></label>
        <input type="text" id="msgInput" placeholder="Type message..." />
        <button id="messageButton">Send</button>
    </div>
    <button id="testSound" type="button">Test Sound</button>

    <div id="pttFullscreenOverlay" aria-hidden="true">
        <button id="pushToTalkFullscreenBtn" class="pttButton" type="button">Hold to Talk</button>
        <button id="exitFullscreenPttBtn" type="button">Exit Fullscreen PTT</button>
    </div>

    <script type="module">
        import { start } from '/js/client.js';
        start(); // manually triggers it
    </script>

    </body>
</html>
