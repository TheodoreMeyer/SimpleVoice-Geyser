plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
}

dependencies {
    // password encryption
    implementation("org.mindrot:jbcrypt:0.4")

    // Json
    implementation("org.json:json:20250107")

    // GeyserMC API (provided by platform)
    compileOnly("org.geysermc.geyser:api:${geysermc_api_version}")
    compileOnly("org.geysermc.floodgate:api:${floodgate_api_version}")

    // Jetty (embedded server)
    implementation("org.eclipse.jetty:jetty-server:11.0.25")
    implementation("org.eclipse.jetty:jetty-servlet:11.0.25")
    implementation("org.eclipse.jetty.websocket:websocket-servlet:11.0.25")
    implementation("org.eclipse.jetty.websocket:websocket-jetty-server:11.0.25")

    // Simple Voice Chat API (provided by platform)
    compileOnly("de.maxhenkel.voicechat:voicechat-api:${voicechat_api_version}")
}

tasks.processResources {
    // include all normal resources
    from(sourceSets.main.resources.srcDirs)

    // include web/ folder into the JAR under "web/"
    from("web") {
        into("web")

        filesMatching("index.html") {
            expand(
                    gitCommit: providers.exec {
                        commandLine("git", "rev-parse", "--short", "HEAD")
                    }.standardOutput.asText.get().trim()
            )
        }
    }
}

tasks.withType(Jar).configureEach {
    archiveBaseName.set("Svg-Core")
}

java {
    withSourcesJar()
    withJavadocJar()
}

tasks.jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifact(tasks.jar)
            artifact(tasks.sourcesJar)
            artifact(tasks.javadocJar)

            groupId = project.group
            artifactId = "svg-core"
            version = project.version
        }
    }
}
//-----------
//Build Identifier
//-----------
def gitCommit = providers.exec {
    commandLine("git", "rev-parse", "--short", "HEAD")
}.standardOutput.asText.get().trim()

// BuildInfo.java generation
tasks.register("generateBuildInfo") {

    def outputDir = layout.buildDirectory.dir("generated/sources/buildinfo")

    outputs.dir(outputDir)

    inputs.property("gitCommit", gitCommit)

    doLast {

        def file = outputDir.get()
                .file("io/github/theodoremeyer/simplevoicegeyser/core/BuildInfo.java")
                .asFile

        file.parentFile.mkdirs()

        file.text = """
package io.github.theodoremeyer.simplevoicegeyser.core;

/**
 * Auto-generated build metadata.
 */
public final class BuildInfo {

    private BuildInfo() {}

    /**
     * Git commit hash used for this build.
     */
    public static final String BUILD_ID = "${gitCommit}";
}
"""
    }
}

// make Gradle compile generated source
sourceSets.main.java.srcDir(
        layout.buildDirectory.dir("generated/sources/buildinfo")
)

tasks.compileJava.dependsOn(tasks.generateBuildInfo)
tasks.sourcesJar.dependsOn(tasks.generateBuildInfo)
tasks.javadocJar.dependsOn(tasks.generateBuildInfo)